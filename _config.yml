title: Mercenaries 2 Modding Wiki
description: Community reference for modding Mercenaries 2 (PC) — the lua-bridge injection tool and a per-module Lua API reference.
baseurl: ""
url: "https://wiki.mercs2.tools"

# Pages under wiki/resident/ (the module reference, LLM-drafted) default to the
# "not yet verified in-game" layout/banner. Individual pages override this once
# someone has actually confirmed the page in-game by setting `verified: true`
# in that page's own front matter -- no site-wide rebuild logic needed, the
# layout just reads the flag per-page.
defaults:
  - scope:
      path: "resident"
    values:
      layout: verified_page
      verified: false

remote_theme: just-the-docs/just-the-docs

# just-the-docs built-ins we want on for a small, brand-new wiki:
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

nav_sort: case_insensitive

footer_content: "Community-maintained. Not affiliated with Pandemic Studios / EA."

# Aux nav links (top-right).
aux_links:
  "Wiki on GitHub":
    - "https://github.com/loganw234/merc2-tools-wiki"
aux_links_new_tab: true

# "Edit this page on GitHub" at the foot of every page. This is the main path for drive-by
# corrections now the repo is public -- a reader can fix a typo without cloning anything.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/loganw234/merc2-tools-wiki"
gh_edit_branch: "main"
gh_edit_view_mode: "edit"

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-remote-theme

# helpbot/ is the assistant's build tooling and Cloudflare Worker -- source, not
# site content. Without this, Jekyll would publish pack_src/*.md as pages and
# copy the ~420 KB generated pack into _site.
# NOTE: setting `exclude` REPLACES Jekyll's default list, so the defaults are
# restated here rather than lost.
exclude:
  - helpbot/
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
