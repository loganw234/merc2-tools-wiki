<script>
/* Apply saved/system light-dark preference before the page paints, so there's
   no flash of the wrong theme. The actual toggle button is created later, in
   footer_custom.html, once the DOM exists -- this part only needs to run
   early and fast. */
(function () {
  try {
    var saved = localStorage.getItem("theme");
    var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  } catch (e) {}
})();
</script>
<style>

   known structural classes plus generic element fallbacks, since we can't
   locally build/preview this theme to confirm exact class names -- the
   generic rules keep things readable even if a specific selector misses. */
html[data-theme="dark"] {
  color-scheme: dark;
}
html[data-theme="dark"] body,
