<style>
/* "Lua Beginners" callout -- a themed, collapsible (closed by default) box for
   dropping plain-English explanations near jargon, without cluttering the page
   for readers who don't need it. Light green is used consistently sitewide so
   readers learn to associate the color with "safe to skip if you already know
   this." Usage:

   <details class="lua101" markdown="1">
   <summary>New to Lua? Click to expand</summary>

   Markdown *works* inside here -- but only because of that markdown="1" attribute above.
   Kramdown treats raw HTML blocks as literal HTML by default; without markdown="1" your
   bullet lists and **bold** text render as plain literal text instead of formatted markdown.

   </details>
*/
details.lua101 {
  background: #eaf7ea;
  border: 1px solid #a8d8a8;
  border-left: 4px solid #4caf50;
  border-radius: 6px;
  padding: 0.6em 1em;
  margin: 1em 0;
}
details.lua101 summary {
  cursor: pointer;
  font-weight: 600;
  color: #2e7d32;
  list-style: none;
}
details.lua101 summary::-webkit-details-marker {
  display: none;
}
details.lua101 summary::before {
  content: "🌱 ";
}
details.lua101 summary:hover {
  color: #1b5e20;
}
details.lua101[open] summary {
  margin-bottom: 0.6em;
}
details.lua101 > *:last-child {
  margin-bottom: 0;
}

/* Sample-script entry -- collapsible (closed by default), title + one-line
   description visible in the summary, full script/explanation behind the
   toggle. Deliberately NOT green (that's reserved for lua101 beginner-help
   boxes) so the two don't get visually confused -- this is real content, not
   an optional aside. Usage:

   <details class="script-entry" markdown="1">
   <summary><strong>ScriptName.lua</strong> -- one-line description of what it does.</summary>

   Full writeup, code block, image, etc. Markdown works here via markdown="1".

   </details>
*/
details.script-entry {
  background: #f5f7fa;
  border: 1px solid #c3ccd6;
  border-left: 4px solid #4a6fa5;
  border-radius: 6px;
  padding: 0.6em 1em;
  margin: 1em 0;
}
details.script-entry summary {
  cursor: pointer;
  font-weight: 600;
  color: #2c3e50;
  list-style: none;
}
details.script-entry summary::-webkit-details-marker {
  display: none;
}
details.script-entry summary::before {
  content: "\1F4DC ";
}
details.script-entry summary:hover {
  color: #1a2733;
}
details.script-entry[open] summary {
  margin-bottom: 0.6em;
}
details.script-entry > *:last-child {
  margin-bottom: 0;
}

/* Floating light/dark toggle button -- see footer_custom.html for the script
   that wires it up via just-the-docs' own jtd.setTheme()/jtd.getTheme() API. */
#theme-toggle {
  position: fixed;
  bottom: 1.25em;
  right: 1.25em;
  z-index: 999;
  width: 2.6em;
  height: 2.6em;
  border-radius: 50%;
  border: 1px solid #c3ccd6;
  background: #ffffff;
  color: #2c3e50;
  font-size: 1.1em;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
}

/* Dark-mode overrides for the two custom boxes above and the toggle button --
   these are ours, not part of just-the-docs' own dark scheme (which works by
   swapping the page's stylesheet file, not by setting any HTML attribute/
   class), so they need their own dark colors and their own signal for when
   dark mode is active. footer_custom.html's script keeps html.wiki-dark in
   sync with jtd.getTheme() -- scope to that class here. */
html.wiki-dark details.lua101 {
  background: #17301c;
  border-color: #2e5c34;
  color: #d7e8d7;
}
html.wiki-dark details.lua101 summary {
  color: #7fd989;
}
html.wiki-dark details.lua101 summary:hover {
  color: #a3e6ac;
}
html.wiki-dark details.script-entry {
  background: #1b222c;
  border-color: #33445c;
  color: #dbe4f0;
}
html.wiki-dark details.script-entry summary {
  color: #a9c3e8;
}
html.wiki-dark details.script-entry summary:hover {
  color: #cddcf2;
}
html.wiki-dark #theme-toggle {
  background: #20232a;
  color: #e3e3e3;
  border-color: #33445c;
}
</style>
