<button id="theme-toggle" type="button" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">🌙</button>

<script>
/* Sitewide light/dark toggle, using just-the-docs' own documented jtd.setTheme()/
   jtd.getTheme() API (see the theme's Customization page) rather than a
   hand-rolled implementation -- this uses the theme's real dark color scheme
   instead of guessed CSS overrides.

   Important: jtd.setTheme() does NOT set any HTML attribute or class -- per
   the theme's own source, it works by swapping the page's stylesheet <link>
   href between assets/css/just-the-docs-light.css and .../-dark.css. There's
   no CSS-visible signal of the current theme at all. Our own custom boxes
   (lua101/script-entry) live in a separate, always-loaded stylesheet
   (head_custom.html) that never gets swapped out, so they need their own
   marker to react to theme changes -- the html.wiki-dark class below is that
   marker, kept in sync with jtd.getTheme() by us, not by jtd.

   jtd.setTheme() also doesn't persist across page loads on its own (the
   docs' own toggle example is a one-page preview, not a saved preference) --
   the localStorage read/write below is what makes the choice stick site-wide.
   This runs from footer_custom.html, which renders late in the page, so
   there's a brief flash of the default scheme on each load before this
   applies the saved choice; a truly flash-free version would need to hook
   in earlier, before <body> renders, which isn't available through this
   include point. */
(function () {
  var STORAGE_KEY = "wiki-theme-preference";
  var btn = document.getElementById("theme-toggle");

  function sync() {
    var isDark = jtd.getTheme() === "dark";
    document.documentElement.classList.toggle("wiki-dark", isDark);
    btn.textContent = isDark ? "☀️" : "🌙";
  }

  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved && jtd.getTheme() !== saved) {
      jtd.setTheme(saved);
    }
  } catch (e) {}

  jtd.addEvent(btn, "click", function () {
    var next = jtd.getTheme() === "dark" ? "light" : "dark";
    jtd.setTheme(next);
    try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
    sync();
  });

  sync();
})();
</script>

<script>
/* Adds a small "Download" button to each sample-script entry's <summary>, so readers can grab the
   .lua file directly instead of copy-pasting out of the code block. Scoped to details.script-entry
   specifically (the sample-scripts pages' box, see head_custom.html), not code blocks in general.
   Reads the already-rendered code block's plain text client-side and downloads it via a Blob -- no
   server involved, works fine on static GitHub Pages hosting. Filename comes from the
   <strong>X.lua</strong> text already present in each entry's own <summary>, so there's nothing to
   configure per script. */
(function () {
  document.querySelectorAll("details.script-entry").forEach(function (entry) {
    var summary = entry.querySelector("summary");
    var strong = summary ? summary.querySelector("strong") : null;
    var pre = entry.querySelector("pre");
    if (!summary || !strong || !pre) {
      return;
    }
    var filename = strong.textContent.trim();
    if (!/\.lua$/i.test(filename)) {
      return;
    }
    var codeEl = pre.querySelector("code") || pre;

    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "script-download-btn";
    btn.textContent = "⬇ Download";
    btn.title = "Download " + filename;
    btn.setAttribute("aria-label", "Download " + filename);
    // preventDefault + stopPropagation: without both, clicking the button (a descendant of
    // <summary>) would also trigger the browser's native toggle-open/closed behavior for the
    // parent <details>, since that's the default action for any click landing on/inside a summary.
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      var blob = new Blob([codeEl.textContent], {type: "text/plain;charset=utf-8"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
    summary.appendChild(btn);
  });
})();
</script>
