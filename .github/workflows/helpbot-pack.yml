name: helpbot pack

# The assistant answers from a context pack generated out of the wiki's own
# content. If someone edits a namespace or resident page and the pack is not
# rebuilt, the assistant keeps answering from the old wiki. This job fails the
# PR in that case, so "the pack is stale" can never be discovered in production.
#
# Regenerating: run `python helpbot/build_pack.py` and commit helpbot/pack/.

on:
  pull_request:
    paths:
      - "namespaces/**"
      - "resident/**"
      - "ess/**"
      - "lua-bridge-api/**"
      - "tutorials/**"
      - "spawn-reference/**"
      - "helpbot/**"
      - "assistant.md"
      - "assets/**"
  push:
    branches: [main]
    paths:
      - "namespaces/**"
      - "resident/**"
      - "ess/**"
      - "lua-bridge-api/**"
      - "tutorials/**"
      - "spawn-reference/**"
      - "helpbot/**"
      - "assistant.md"
      - "assets/**"

jobs:
  check-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the committed pack matches the wiki
        run: python helpbot/build_pack.py --check

      # A live answer once invented spawn template names because the
      # authoritative list was a top-level page the builder never walked, and
      # nothing failed -- the pack was simply missing a whole category and the
      # model filled the gap. This asserts every namespace/ess page actually
      # contributes entries, that known-real symbols are present in the section
      # they belong to, and that known-fake ones never leak into generated text.
      - name: Pack coverage (no silent extraction holes)
        run: python helpbot/build_pack.py --coverage

      # The chat app lives in assets/assistant.js as a static file precisely
      # because the theme's layout minifies HTML pages onto one line -- a
      # single // comment in an INLINE script comments out everything after it
      # and the page silently does nothing. Two guards:
      #   1. the asset must parse;
      #   2. assistant.md must never grow an inline <script> block again
      #      (external src= tags are fine -- they are not minified content).
      - name: Chat app asset parses
        run: node --check assets/assistant.js

      - name: No inline scripts in assistant.md
        run: |
          if grep -n '<script>' assistant.md; then
            echo "::error::Inline <script> found in assistant.md -- the theme's HTML"
            echo "::error::minification silently breaks inline JS. Move it to assets/assistant.js."
            exit 1
          fi
          echo "[ok] no inline script blocks"
      - name: Report pack size
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("helpbot/pack/pack.meta.json")
          if p.exists():
              m = json.loads(p.read_text())
              print(f"pack: ~{m['est_tokens']} est tokens, sha {m['sha256'][:16]}")
              for s in m["sections"]:
                  flag = " OVER" if s["over_budget"] else ""
                  print(f"  {s['id']:<12} {s['est_tokens']:>7}{flag}")
          PY
